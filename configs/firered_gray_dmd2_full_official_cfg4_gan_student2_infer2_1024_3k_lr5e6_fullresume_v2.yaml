model:
  model_name: QwenImageEdit
  aux_time_embed: false
  model_path: /vepfs-cnbja62d5d769987/suntengjiao/distill/firered_gray_depth/ckpts_gray_lora_merged_v1
  drop_text_encoder: true
data:
  firered_project_root: /vepfs-cnbja62d5d769987/suntengjiao/distill/firered_gray_depth
  condition_mode: offline
  height: 1024
  width: 1024
  train_jsonl: [/vepfs-cnbja62d5d769987/suntengjiao/distill/firered_gray_depth/clay_meta/clay/clay.jsonl]
  max_samples:
  repeat: 1
  instruction_field: instruction
  embedding_field: embeddings_tensor_en
  uncond_embedding_field: embeddings_tensor_droptext
method:
  method_type: DMD2FullOfficial
  critic_mode: separate_full
  teacher_match_loss_weight: 0.0
  dm_loss_weight: 1.0
  fake_loss_weight: 1.0
  gan_loss_weight: 5.0e-3
  gan_classifier_loss_weight: 1.0e-2
  gan_classifier_type: qwen_hidden_state
  gan_feature_layer: 30
  gan_classifier_hidden_channels: 128
  gan_noise_t_min: 0.0
  gan_noise_t_max: 0.98
  real_guidance_scale: 4.0
  fake_guidance_scale: 1.0
  dfake_gen_update_ratio: 5
  student_train_sampling_steps: 2
  student_train_backprop_mode: single_step
  sequential_backward: true
  dm_grad_clip: 10.0
  dm_grad_eps: 1.0e-6
sample: {seed: 42, cfg_scale: 0, sampling_steps: 2, sampling_style: dmd2_renoise}
eval:
  enabled: true
  eval_jsonl: [/vepfs-cnbja62d5d769987/suntengjiao/distill/firered_gray_depth/clay_meta/clay/clay.jsonl]
  max_samples: 4
  batch_size: 1
  num_workers: 0
  start_step: 250
  every_steps: 250
  cfg_scale: 0
  seed: 42
  sampling_steps: 2
  sampling_style: dmd2_renoise
  reference_manifest: /vepfs-cnbja62d5d769987/suntengjiao/distill/reports/firered_gray_twinflow_review_20260622/artifacts/orig_lora_vanilla_source_cfg4_20260625/source_cfg4_reference_manifest.json
  reference_labels: [orig_lora_source_40_cfg4]
  variants:
    - {label: dmd2_cfg4_gan_train2_infer2_1024, sampling_style: dmd2_renoise, sampling_steps: 2}
train:
  checkpoint_mode: full_training_state
  load_checkpoint_path: auto_latest
  resume_require_optimizer: true
  resume_require_train_state: true
  resume_require_rng_state: true
  resume_strict_world_size: true
  output_dir: /vepfs-cnbja62d5d769987/suntengjiao/distill/firered_gray_depth/outputs/dmd2_firered_gray_full_official_cfg4_gan_matched_nfe_1024_3k_lr5e6_fullresume_v2
  seed: 42
  grad_accumulation_steps: 1
  micro_batch_size: 1
  max_train_steps: 3000
  num_train_epochs: 1
  num_workers: 4
  lr: 5.0e-6
  fake_lr: 5.0e-6
  betas: [0.9, 0.99]
  weight_decay: 0.0
  max_grad_norm: 1.0
  save_every: 250
  save_final_checkpoint: true
  save_optimizer_state: true
  checkpoints_total_limit: 1
  # Exact full state measures about 458 GiB; 600 GiB keeps 142 GiB write headroom.
  checkpoint_expected_size_gb: 600
  # Shared VEPFS cannot stage two 458G full states; retain only the newest state.
  checkpoint_preclean_before_save: true
  precision_mode: bf16
  fsdp_backend: fsdp1
  fsdp_use_orig_params: false
  fsdp_backward_prefetch: false
  fsdp_forward_prefetch: false
  fsdp_limit_all_gathers: true
  gradient_checkpointing: true
  gradient_checkpointing_use_reentrant: false
  primary_num_steps: 2
  candidate_num_steps: [2]
  cfg_scale: 0
